<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Trans Advice Agent</title>
<link href="bootstrap.min.css" rel="stylesheet"/>
<style>
  body {
    margin: 0;
    padding: 1rem;
    background: #ffffff;
    color: #1f2937;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .chat-shell {
    max-width: 980px;
    margin: 0 auto;
  }

  /* Rendered-markdown answer styles */
  #answerText h1, #answerText h2 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
  #answerText h3, #answerText h4 { font-size: 1.1rem; margin: 0.85rem 0 0.4rem; }
  #answerText ul, #answerText ol { padding-left: 1.4rem; margin-bottom: 0.75rem; }
  #answerText li { margin-bottom: 0.2rem; }
  #answerText p { margin-bottom: 0.75rem; }
  #answerText blockquote {
    border-left: 3px solid #d1d5db;
    padding-left: 0.75rem;
    color: #4b5563;
  }
  #answerText hr { margin: 1rem 0; }
  /* Fallback: if markdown libraries fail to load we insert plain text and
     keep line breaks readable */
  #answerText.plain-text { white-space: pre-line; }
</style>
</head>
<body>
<main class="chat-shell">
  <h4 class="mb-3">Ask a Question</h4>

  <form id="questionForm">
    <div class="form-group mb-3">
      <label for="questionInput">Your Question:</label>
      <textarea class="form-control" id="questionInput" rows="3" placeholder="Type your question here..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>

  <div class="mt-3" id="loadingSpinner" style="display:none;">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <span class="ml-2" id="loadingLabel">Loading...</span>
  </div>

  <div class="mt-4" id="answerSection" style="display:none;">
    <h4>Answer:</h4>
    <div id="answerText"></div>
    <h5>Sources:</h5>
    <p class="small text-muted">Sorted by relevance.</p>
    <div id="sourcesContainer">
      <div id="sourcesList"></div>
      <nav aria-label="Sources pagination" class="mt-2">
        <ul class="pagination pagination-sm" id="sourcesPagination"></ul>
      </nav>
      <div class="d-flex justify-content-between mt-2">
        <button class="btn btn-sm btn-outline-secondary" id="sourcesPrev">Prev</button>
        <button class="btn btn-sm btn-outline-secondary" id="sourcesNext">Next</button>
      </div>
    </div>
  </div>
</main>


<script src="jquery.min.js"></script>
<script src="bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>
const RESIZE_MESSAGE_TYPE = "trans-agent:height";
let hasInteracted = false;

// Warm the backend as soon as the widget loads: the free-tier instance spins
// down when idle, so this starts the wake-up while the visitor is still
// reading the page. Failures are fine — the submit flow below has its own
// wake-and-retry loop.
fetch("https://transadviceagent.onrender.com/", { method: "GET" }).catch(() => {});

// Render a markdown answer into #answerText. Sanitized via DOMPurify; falls
// back to plain text (preserving line breaks) if the CDN libraries are absent.
function renderAnswer(markdownText) {
  const answerText = document.getElementById("answerText");
  if (window.marked && window.DOMPurify) {
    answerText.classList.remove("plain-text");
    answerText.innerHTML = DOMPurify.sanitize(marked.parse(markdownText));
  } else {
    answerText.classList.add("plain-text");
    answerText.textContent = markdownText;
  }
}

function postHeightToParent() {
  if (!hasInteracted) {
    return;
  }

  const height = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight
  );

  if (window.parent && window.parent !== window) {
    window.parent.postMessage(
      { type: RESIZE_MESSAGE_TYPE, height },
      window.location.origin
    );
  }
}

window.addEventListener("load", postHeightToParent);
window.addEventListener("resize", postHeightToParent);

if ("ResizeObserver" in window) {
  const resizeObserver = new ResizeObserver(() => postHeightToParent());
  resizeObserver.observe(document.body);
}

const mutationObserver = new MutationObserver(() => postHeightToParent());
mutationObserver.observe(document.body, {
  childList: true,
  subtree: true,
  attributes: true,
  characterData: true,
});

document.getElementById("questionForm").addEventListener("submit", async function(e) {
    e.preventDefault();
  hasInteracted = true;

    const question = document.getElementById("questionInput").value;
    const answerSection = document.getElementById("answerSection");
    const answerText = document.getElementById("answerText");
  const sourcesListEl = document.getElementById("sourcesList");
  const sourcesPaginationEl = document.getElementById("sourcesPagination");
    const spinner = document.getElementById("loadingSpinner");
    const loadingLabel = document.getElementById("loadingLabel");

    // Reset UI
    spinner.style.display = "inline-flex";
    loadingLabel.textContent = "Waking server (this may take up to a minute)…";
  answerSection.style.display = "none";
  answerText.textContent = "";
  if (sourcesListEl) {
    sourcesListEl.textContent = "";
  }
  if (sourcesPaginationEl) {
    sourcesPaginationEl.innerHTML = "";
  }
  postHeightToParent();

    try {
        // --- Step 1: Wake server ---
        const maxWaitTimeMs = 120000; // 2 minutes
        const delayMs = 5000;         // 5s retry
        const startTime = Date.now();
        let serverAwake = false;

        while (Date.now() - startTime < maxWaitTimeMs) {
            try {
                const res = await fetch("https://transadviceagent.onrender.com/", { method: "GET" });
                if (res.ok) {
                    serverAwake = true;
                    break;
                }
            } catch (_) {
                // ignore failures until retry
            }
            console.log("Server still waking, retrying in 5s...");
            await new Promise(resolve => setTimeout(resolve, delayMs));
        }

        if (!serverAwake) {
            throw new Error("Server did not wake within 2 minutes.");
        }

        // --- Step 2: Query backend for answer ---
        loadingLabel.textContent = "Generating answer…";

        const response = await fetch("https://transadviceagent.onrender.com/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
        });

        if (!response.ok) {
            // The backend returns HTTP 500 with {"error": "..."} on failures —
            // surface that detail instead of a generic message.
            let detail = "";
            try {
                const errBody = await response.json();
                detail = errBody.error || errBody.detail || "";
            } catch (_) { /* non-JSON error body */ }
            throw new Error(detail ? `Backend error: ${detail}` : `Backend returned HTTP ${response.status}.`);
        }

        const data = await response.json();
        if (data.error) {
            // Older backend versions returned 200 with an "error" key.
            throw new Error(`Backend error: ${data.error}`);
        }
        console.debug('DEBUG: full backend response', data);
        if (data && data.sources) {
          try {
            console.debug('DEBUG: sources (first 20 items types and values)', data.sources.slice(0,20).map((s,idx)=>({index: idx, type: typeof s, sample: s}))); 
          } catch (e) {
            console.debug('DEBUG: sources logging error', e, data.sources);
          }
        } else {
          console.debug('DEBUG: no data.sources present', data);
        }
        renderAnswer(data.answer || "No answer returned.");
    // Paginated sources display (10 per page)
  const sourcesPerPage = 10;

    // Helper: isValidUrl
    function isValidUrl(u) {
      try {
        new URL(u);
        return true;
      } catch (_) {
        return false;
      }
    }

    // Helper: getUrlAndText from a source which may be a string or an object {title, source, url}
    function getUrlAndText(src) {
      // If backend returned a simple string (URL), keep previous behavior
      if (typeof src === 'string') return { url: src, text: src };

      if (src && typeof src === 'object') {
        // Prefer the explicit fields the backend provides
        const url = src.url || src.link || src.href || null;
        const title = (typeof src.title === 'string' && src.title.trim()) ? src.title.trim() : null;
        const sourceName = (typeof src.source === 'string' && src.source.trim()) ? src.source.trim() : null;

        if (sourceName || title) {
          // Format exactly as requested: "source: title"
          const safeSource = sourceName || 'Source';
          const safeTitle = title || '(no title)';
          return { url, text: `${safeSource}: ${safeTitle}` };
        }

        // If title/source aren't present but a URL is, use domain as source and path as title
        if (url) {
          try {
            const parsed = new URL(url);
            const hostname = parsed.hostname.replace(/^www\./, '');
            const pathname = parsed.pathname.replace(/^\//, '');
            const text = pathname ? `${hostname}: ${pathname}` : hostname;
            return { url, text };
          } catch (_) {
            // fallback to raw URL
            return { url, text: url };
          }
        }

        // Last resort: JSON stringify the object
        return { url: null, text: JSON.stringify(src) };
      }

      return { url: null, text: String(src) };
    }

    // Helper: render a page of sources
    let currentPage = 0;
    function renderSourcesPage(sources, page) {
      currentPage = page;
      sourcesListEl.innerHTML = '';
      const start = page * sourcesPerPage;
      const end = Math.min(start + sourcesPerPage, sources.length);
      for (let i = start; i < end; i++) {
        let src = sources[i];
        const div = document.createElement('div');

        // If backend returned a JSON stringified object, try to parse it
        if (typeof src === 'string') {
          try {
            const parsed = JSON.parse(src);
            // only replace if parsed is an object with expected fields
            if (parsed && typeof parsed === 'object') {
              src = parsed;
            }
          } catch (_) {
            // not JSON, leave as string URL
          }
        }

        // If src is an object, use its source/title/url fields directly
        if (src && typeof src === 'object' && !Array.isArray(src)) {
          const url = src.url || src.link || src.href || null;
          const sourceName = (typeof src.source === 'string' && src.source.trim()) ? src.source.trim() : 'Source';
          const title = (typeof src.title === 'string' && src.title.trim()) ? src.title.trim() : '(no title)';
          const linkText = `${sourceName}: ${title}`;

          if (url && isValidUrl(url)) {
            const a = document.createElement('a');
            a.href = url;
            a.textContent = linkText;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            div.appendChild(a);
          } else {
            div.textContent = linkText + (url ? ` (${url})` : '');
          }

        } else {
          // Fallback: src is a plain string (URL or other). Show it as a link if valid.
          const { url, text } = getUrlAndText(src);
          if (url && isValidUrl(url)) {
            const a = document.createElement('a');
            a.href = url;
            a.textContent = text;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            div.appendChild(a);
          } else {
            div.textContent = text + (url ? ` (${url})` : '');
          }
        }

        sourcesListEl.appendChild(div);
      }
      // update pagination active state
      Array.from(sourcesPaginationEl.children).forEach((child, idx) => {
        child.classList.toggle('active', idx === page);
      });
      // update Prev/Next disabled state
      const prevBtn = document.getElementById('sourcesPrev');
      const nextBtn = document.getElementById('sourcesNext');
      if (prevBtn) prevBtn.disabled = page <= 0;
      if (nextBtn) nextBtn.disabled = end >= sources.length;
    }

    // Helper: build pagination controls
    function buildPagination(sources) {
      sourcesPaginationEl.innerHTML = '';
      const pageCount = Math.ceil(sources.length / sourcesPerPage);
      if (pageCount <= 1) return;

      for (let p = 0; p < pageCount; p++) {
        const li = document.createElement('li');
        li.className = 'page-item' + (p === 0 ? ' active' : '');
        const a = document.createElement('a');
        a.className = 'page-link';
        a.href = '#';
        a.textContent = (p + 1).toString();
        a.addEventListener('click', (ev) => {
          ev.preventDefault();
          renderSourcesPage(sources, p);
        });
        li.appendChild(a);
        sourcesPaginationEl.appendChild(li);
      }

      // wire Prev/Next
      const prevBtn = document.getElementById('sourcesPrev');
      const nextBtn = document.getElementById('sourcesNext');
      if (prevBtn) prevBtn.onclick = () => {
        if (currentPage > 0) renderSourcesPage(sources, currentPage - 1);
      };
      if (nextBtn) nextBtn.onclick = () => {
        const pageCount = Math.ceil(sources.length / sourcesPerPage);
        if (currentPage < pageCount - 1) renderSourcesPage(sources, currentPage + 1);
      };
    }

    if (data.sources && data.sources.length > 0) {
      // store and render first page
      const sources = data.sources;
      renderSourcesPage(sources, 0);
      buildPagination(sources);
    } else {
      sourcesListEl.textContent = 'No sources available.';
      sourcesPaginationEl.innerHTML = '';
    }
        answerSection.style.display = "block";
      postHeightToParent();

    } catch (error) {
        console.error(error);
  answerText.classList.add("plain-text");
  answerText.innerHTML = "";
  const errP = document.createElement("p");
  errP.className = "text-danger";
  errP.textContent = "Something went wrong — the server might still be waking or busy. Try again in a few seconds.";
  const errDetail = document.createElement("p");
  errDetail.className = "small text-muted";
  errDetail.textContent = error && error.message ? error.message : "";
  answerText.appendChild(errP);
  if (errDetail.textContent) answerText.appendChild(errDetail);
  if (sourcesListEl) sourcesListEl.textContent = "";
  if (sourcesPaginationEl) sourcesPaginationEl.innerHTML = "";
        answerSection.style.display = "block";
      postHeightToParent();
    } finally {
        spinner.style.display = "none";
      postHeightToParent();
    }
});
</script>

</body>
</html>
